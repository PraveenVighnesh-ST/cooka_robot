controller_manager:
  ros__parameters:
    update_rate: 100

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster

    arm_controller:
      type: joint_trajectory_controller/JointTrajectoryController

    gripper_controller:
      type: forward_command_controller/ForwardCommandController

arm_controller:
  ros__parameters:
    joints:
      - h_slider
      - v_slider
      - scara_j1
      - scara_j2
      - wrist_z
      - wrist_y
    # Velocity command interface: JTC converts position trajectories to velocity
    # commands using the per-joint PID below.  gz_ros2_control passes the velocity
    # straight to the physics engine — no global position_proportional_gain involved.
    command_interfaces:
      - velocity
    state_interfaces:
      - position
      - velocity
    allow_partial_joints_goal: false
    open_loop_control: false
    # Per-joint PID  (units: (m/s)/m = 1/s for prismatic, (rad/s)/rad = 1/s for revolute)
    # P=50 → 1 cm error produces 0.5 m/s correction (safe for max Y_SPEED=0.2 m/s).
    # D=0.5 damps transient overshoot. I=0 (no steady-state gravity error since gravity=false).
    gains:
      h_slider:
        p: 50.0
        i: 0.0
        d: 0.5
        i_clamp: 5.0
      v_slider:
        p: 50.0
        i: 0.0
        d: 0.5
        i_clamp: 5.0
      scara_j1:
        p: 50.0
        i: 0.0
        d: 0.5
        i_clamp: 5.0
      scara_j2:
        p: 50.0
        i: 0.0
        d: 0.5
        i_clamp: 5.0
      wrist_z:
        p: 50.0
        i: 0.0
        d: 0.5
        i_clamp: 5.0
      wrist_y:
        p: 50.0
        i: 0.0
        d: 0.5
        i_clamp: 5.0

gripper_controller:
  ros__parameters:
    joints:
      - finger_bottom
    interface_name: position
